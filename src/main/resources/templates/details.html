<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recipe Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="recipe-card">
    <h1 th:text="${recipe.title}">Recipe Title</h1>
    <p><strong>Preparation Time:</strong> <span th:text="${recipe.preparationTime}">0</span> minutes</p>
    <p><strong>Chef:</strong> <span th:text="${recipe.creator.username}">Username</span></p>

    <hr>
    <h3>Instructions</h3>
    <p style="white-space: pre-wrap;" th:text="${recipe.instructions}">Cooking instructions go here...</p>

    <hr>
    <h3>Reviews & Feedback</h3>
    <div th:if="${reviews.isEmpty()}">
        <p>No reviews yet. Share your thoughts below!</p>
    </div>
    <div th:each="review : ${reviews}" style="border-bottom: 1px solid var(--border-color); padding: 12px 0;">
        <p><strong th:text="${review.author.username}">User</strong> rated it: <span th:text="${review.rating}">0</span>/5</p>
        <p th:text="${review.comment}">Comment text...</p>
    </div>

    <div class="review-block">
        <h4>Leave a Review</h4>
        <form th:action="@{|/recipes/${recipe.id}/review|}" method="POST">
            <div class="form-group">
                <label for="rating">Rating (1-5)</label>
                <input type="number" id="rating" name="rating" min="1" max="5" required>
            </div>
            <div class="form-group">
                <label for="comment">Your Comment</label>
                <textarea id="comment" name="comment" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn-primary">Submit Review</button>
        </form>
    </div>
    <a href="/recipes" class="back-link">← Back to Dashboard</a>
</main>
</body>
</html>
