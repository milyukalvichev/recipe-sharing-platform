<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to RecipeSphere</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main style="text-align: center; margin-top: 80px;">
    <h1>Welcome to RecipeSphere 🍳</h1>
    <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px;">Discover, share, and review the best cooking recipes from around the world.</p>

    <div th:if="${session.user_id == null}" style="display: flex; gap: 15px; justify-content: center; max-width: 320px; margin: 0 auto;">
        <a href="/login" class="btn-primary">Sign In</a>
        <a href="/register" class="btn-primary" style="background-color: #3b82f6; box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);">Join Now</a>
    </div>

    <div th:if="${session.user_id != null}" style="max-width: 240px; margin: 0 auto;">
        <a href="/recipes" class="btn-primary">Go to Dashboard</a>
    </div>
</main>
</body>
</html>
